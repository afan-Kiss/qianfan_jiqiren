# 祥钰 — 80 端口路径入口（与其它服务共存，不占用根路径）
server {
    listen 80;
    server_name xiangyu.duckdns.org 8.137.126.18;

    client_max_body_size 30m;

    # 祥钰打包拍照 Web（无登录）
    location /xiangyu-proxy/ {
        proxy_pass http://127.0.0.1:35871/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /xiangyu-proxy {
        return 301 /xiangyu-proxy/;
    }

    # 千帆纯协议桥接（health / send / open-session）
    location /xiangyu-bridge/ {
        proxy_pass http://127.0.0.1:35872/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 30m;
    }

    location = /xiangyu-bridge {
        return 301 /xiangyu-bridge/;
    }

    access_log /www/wwwlogs/xiangyu-web.access.log;
    error_log /www/wwwlogs/xiangyu-web.error.log;
}
