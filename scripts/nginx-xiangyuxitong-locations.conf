# 祥钰系统独立 Nginx 片段（由 watchdog 维护，勿删）
    location /xiangyuxitong/ {
        proxy_pass http://127.0.0.1:35871/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 30m;
    }

    location = /xiangyuxitong {
        return 301 /xiangyuxitong/;
    }

    location /xiangyuxitong-bridge/ {
        proxy_pass http://127.0.0.1:35872/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 30m;
    }

    location = /xiangyuxitong-bridge {
        return 301 /xiangyuxitong-bridge/;
    }
