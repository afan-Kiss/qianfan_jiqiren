<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>千帆订单采集系统</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div>
        <h1>千帆订单采集系统</h1>
        <p class="subtitle">纯协议自动拉单 · 自动解密手机/地址 · 一键导出</p>
      </div>
      <div class="header-meta" id="shopMeta">加载店铺...</div>
    </header>

    <section class="filters card">
      <div class="filter-row">
        <label class="grow api-base-label">
          拉单 API（服务器）
          <input id="apiBase" type="text" placeholder="http://8.137.126.18:35872" />
        </label>
        <button id="btnSaveApi" class="btn">保存 API</button>
      </div>
      <div class="filter-row">
        <label>
          店铺
          <select id="shopSelect" multiple size="1"></select>
        </label>
        <label>
          订单状态
          <select id="statusSelect">
            <option value="all">所有订单状态</option>
            <option value="待配货">待配货</option>
            <option value="待收货">待收货</option>
            <option value="已签收">已签收</option>
            <option value="已完成">已完成</option>
            <option value="已关闭">已关闭</option>
            <option value="取消发货">取消发货</option>
          </select>
        </label>
        <label>
          搜索类型
          <select id="searchType">
            <option value="all">全部</option>
            <option value="orderId">订单号</option>
            <option value="packageId">包裹号</option>
            <option value="buyerNick">买家昵称</option>
            <option value="phone">手机号</option>
            <option value="expressNo">运单号</option>
          </select>
        </label>
        <label class="grow">
          关键词
          <input id="searchText" type="text" placeholder="可选，支持模糊搜索" />
        </label>
      </div>
      <div class="filter-row">
        <label>
          开始日期
          <input id="dateBegin" type="date" />
        </label>
        <label>
          结束日期
          <input id="dateEnd" type="date" />
        </label>
        <div class="actions">
          <button id="btnSearch" class="btn primary">搜索</button>
          <button id="btnReset" class="btn">重置</button>
          <button id="btnExport" class="btn success" disabled>导出全部 Excel</button>
        </div>
      </div>
    </section>

    <section class="stats card" id="statsBar">请选择日期后搜索</section>

    <section class="table-wrap card">
      <div class="table-scroll">
        <table id="orderTable">
          <thead>
            <tr>
              <th>订单号</th>
              <th>包裹号</th>
              <th>状态</th>
              <th>用户名</th>
              <th>用户ID</th>
              <th>手机号</th>
              <th>收件人</th>
              <th>商家名称</th>
              <th>发货仓</th>
              <th>收货地址</th>
              <th>运单号</th>
              <th>创建时间</th>
              <th>支付时间</th>
              <th>实付金额</th>
              <th>商品名称</th>
              <th>规格</th>
              <th>数量</th>
              <th>售后状态</th>
            </tr>
          </thead>
          <tbody id="orderBody">
            <tr><td colspan="18" class="empty">暂无数据</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <div id="loading" class="loading hidden">
    <div class="loading-box">
      <div class="spinner"></div>
      <div id="loadingText">正在拉单并自动解密，请稍候...</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
